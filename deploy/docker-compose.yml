version: "3.9"
services:
  api:
    build: ..
    command: ["python", "-m", "varden.api", "--config", "/config/prod.env"]
    ports:
      - "8000:8000"
    volumes:
      - varden_data:/data
      - ./config:/config
      - varden_backups:/app/backups
    environment:
      VARDEN_DB_PATH: /data/varden.db
      VARDEN_AUTH_DB_PATH: /data/varden_auth.db
      VARDEN_POLICY_FILE: /config/policy.json
      VARDEN_PUBLIC_BASE_URL: http://localhost:8000
      VARDEN_ENABLE_DEV_BOOTSTRAP: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: ..
    command: ["python", "-m", "varden.worker_service", "--config", "/config/prod.env"]
    volumes:
      - varden_data:/data
      - ./config:/config
    restart: unless-stopped

volumes:
  varden_data:
  varden_backups:
